name: CI/CD - PC Craft AI Service

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push AI Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service        # ← point to subfolder
          file: ./ai-service/Dockerfile 
          push: true
          tags: |
            adilaadhi/ai-service:latest
            adilaadhi/ai-service:${{ github.sha }}

      - name: Deploy to k3s
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo kubectl set image deployment/ai-service \
              ai-service=adilaadhi/ai-service:${{ github.sha }}
            sudo kubectl rollout status deployment/ai-service --timeout=120s

            echo "✅ AI Service deployed!"
            sudo kubectl get pods -l app=ai-service
